<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Video Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <div class="profile-container">
            <img src="assets/img/propic.jpg" alt="Profile" class="hero-img">
        </div>
        <h1>PORTFOLIO</h1>
        <p>Video Editor & Content Strategist</p>
    </section>

    <div class="category-section">
        <div class="category-header" onclick="toggleSection(this.parentElement)">
            <h2>Mik Cosentino</h2>
            <span class="icon">+</span>
        </div>
        <div class="video-grid">
            <div class="video-card" onclick="openLightbox('assets/video/mik-redbull.mp4')">
                <video muted loop playsinline><source src="assets/video/mik-redbull.mp4" type="video/mp4"></video>
            </div>
            </div>
    </div>

    <div class="category-section">
        <div class="category-header" onclick="toggleSection(this.parentElement)">
            <h2>Riccardo Ruggeri</h2>
            <span class="icon">+</span>
        </div>
        <div class="video-grid">
            <div class="video-card" onclick="openLightbox('assets/video/ruggeri-rolex.mp4')">
                <video muted loop playsinline><source src="assets/video/ruggeri-rolex.mp4" type="video/mp4"></video>
            </div>
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close-btn" onclick="closeLightbox()">&times;</span>
        <video id="lightbox-video" controls autoplay></video>
    </div>

    <script src="script.js"></script>
</body>
</html>
